<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>間隔反復 英単語暗記アプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .info-text {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }
        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        .word-card {
            background: #fafafa;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .word-info {
            display: flex;
            align-items: flex-start;
        }
        .question-num {
            font-weight: bold;
            color: #3498db;
            margin-right: 15px;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .word-text-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        /* 1ページ目の出題用（単語ブロック内でも単体で見やすく） */
        .page1-jp {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.5;
        }
        /* 2ページ目の答え合わせ用（赤文字に差し戻し） */
        .en-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e74c3c; 
        }
        .jp-sub-text {
            font-size: 1.05rem;
            color: #555;
            font-weight: normal;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            align-self: center; /* カードの右側中央に配置 */
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        /* 共通の大ボタン */
        .btn-action {
            background-color: #3498db;
            color: white;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            padding: 12px;
        }
        .btn-action:hover { background-color: #2980b9; }
        
        .btn-secondary {
            background-color: #95a5a6;
            color: white;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            padding: 10px;
        }
        .btn-secondary:hover { background-color: #7f8c8d; }

        /* 初期状態のグレーボタン */
        .btn-check {
            background-color: #e2e8f0;
            color: #7f8c8d;
            font-weight: bold;
        }
        .btn-check:hover { background-color: #cbd5e1; }

        /* 選択された時の色 */
        .btn-check.correct-active {
            background-color: #2ecc71;
            color: white;
        }
        .btn-check.incorrect-active {
            background-color: #e74c3c;
            color: white;
        }

        /* 無効化状態のボタン */
        button:disabled {
            background-color: #cbd5e1 !important;
            color: #94a3b8 !important;
            cursor: not-allowed;
        }

        /* 入力フォーム用スタイル */
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .input-row span {
            font-weight: bold;
            color: #7f8c8d;
            width: 30px;
        }
        .input-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        /* バックアップ用リンク風デザイン */
        .backup-zone {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px dotted #cbd5e1;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.85rem;
        }
        .link-btn {
            background: none;
            border: none;
            color: #7f8c8d;
            padding: 0;
            font-size: 0.85rem;
            text-decoration: underline;
            cursor: pointer;
        }
        .link-btn:hover {
            color: #34495e;
        }
        .file-label-link {
            color: #7f8c8d;
            text-decoration: underline;
            cursor: pointer;
        }
        .file-label-link:hover {
            color: #34495e;
        }

        .hidden { display: none; }
        
        .result-message {
            text-align: center;
            font-size: 1.2rem;
            margin: 40px 0;
            color: #27ae60;
            font-weight: bold;
        }
        #json-upload { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-0">
        <h1>英単語暗記アプリ</h1>
        <p id="db-status" class="info-text">登録されている単語: 0語</p>
        
        <div class="menu-group">
            <button class="btn-action" style="margin-top:0;" onclick="startTestPage()">テストを実施</button>
            <button class="btn-action" style="background-color: #2ecc71;" onclick="goToAddPage()">問題を追加</button>
        </div>

        <div class="backup-zone">
            <button class="link-btn" onclick="exportToJSON()">データをJSONに保存</button>
            <div>
                <label for="json-upload" class="file-label-link">JSONから読み込み</label>
                <input type="file" id="json-upload" accept=".json" onchange="importFromJSON(this)">
            </div>
        </div>
    </div>

    <div id="page-1" class="hidden">
        <h1>英単語テスト (10問)</h1>
        <p id="candidate-count" class="info-text"></p>
        
        <div id="question-list"></div>

        <button id="btn-to-page2" class="btn-action" onclick="goToPage2()">すべての回答を終了して答え合わせへ</button>
        <button class="btn-secondary" onclick="goToMenu()">メニューに戻る</button>
    </div>

    <div id="page-2" class="hidden">
        <h1>答え合わせ</h1>
        <p class="info-text">紙の回答と見比べて、全問の結果をチェックしてください。</p>
        
        <div id="answer-list"></div>

        <button id="btn-submit-record" class="btn-action" onclick="submitRecords()" disabled>結果を記録</button>
        <button class="btn-secondary" onclick="goToMenu()">メニューに戻る</button>
    </div>

    <div id="page-3" class="hidden">
        <h1>記録完了</h1>
        <div class="result-message">🎉 今回のテスト結果をDBに記録しました！</div>
        <p class="info-text">正解した単語の間隔が引き延ばされ、次回出題が先になります。</p>
        
        <button class="btn-action" onclick="restartTest()">次の10問を実施する</button>
        <button class="btn-secondary" onclick="goToMenu()">メニューに戻る</button>
    </div>

    <div id="page-add" class="hidden">
        <h1>問題を追加 (最大10件)</h1>
        <p class="info-text">追加したい「英語」と「日本語」を入力してください。<br>※片方のみ入力された行がある場合は保存できません。</p>
        
        <div id="input-fields-container"></div>

        <button class="btn-action" style="background-color: #2ecc71;" onclick="saveNewWords()">追加する</button>
        <button class="btn-secondary" onclick="goToMenu()">キャンセルして戻る</button>
    </div>
</div>

<script>
// ローカルストレージ用のキー名
const STORAGE_KEY = 'interval_flashcards_db';

// ヘルパー関数: 指定日後の日付オブジェクト（時刻なし）を返す
function getFutureDate(days) {
    let d = new Date();
    d.setHours(0, 0, 0, 0); 
    d.setDate(d.getDate() + days);
    return d;
}

let wordDatabase = [];
let currentTestWords = [];
let tempSelections = {};

// LocalStorageにデータを保存
function saveToLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(wordDatabase));
}

// LocalStorageからデータを読み込み
function loadFromLocalStorage() {
    const localData = localStorage.getItem(STORAGE_KEY);
    if (localData) {
        try {
            wordDatabase = JSON.parse(localData);
        } catch (e) {
            console.error("LocalStorageデータのパースに失敗しました", e);
            wordDatabase = [];
        }
    }
}

function updateMenuStatus() {
    document.getElementById('db-status').innerText = `登録されている単語: ${wordDatabase.length}語`;
}

function startTestPage() {
    if (wordDatabase.length === 0) {
        alert("単語が登録されていません。「問題を追加」してください。");
        return;
    }
    switchPage('page-0', 'page-1');
    startTest();
}

function startTest() {
    tempSelections = {}; 
    
    // 今日の日付（時刻ゼロクリア）
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // 1. 日付が予定日を超えている（今日を含む過去）の単語をフィルタリング
    let candidates = wordDatabase.filter(word => {
        const nextDateObj = new Date(word.nextDate);
        return nextDateObj <= today;
    });

    // 画面に対象単語数を表示
    const countText = document.getElementById('candidate-count');
    countText.innerText = `手元の「紙」に英語で回答を記入してください。（現在出題可能な残り: ${candidates.length}語）`;

    // 2. 出題候補の中から「完全にランダム」に最大10問を抽出
    // 配列をフィッシャー–イェーツのシャッフル
    for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    // 先頭から10問を今回のテストに決定
    currentTestWords = candidates.slice(0, 10);

    // 出題表示の生成
    const questionListDiv = document.getElementById('question-list');
    questionListDiv.innerHTML = '';
    
    if (currentTestWords.length === 0) {
        questionListDiv.innerHTML = '<p style="text-align:center; color:#e74c3c; font-weight:bold; margin: 30px 0;">現在、復習予定の単語はありません！<br>(すべての単語が定着しているか、未来の予定になっています)</p>';
        document.getElementById('btn-to-page2').disabled = true;
        return;
    } else {
        document.getElementById('btn-to-page2').disabled = false;
    }

    currentTestWords.forEach((word, index) => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <div class="word-info">
                <span class="question-num">Q${index + 1}</span>
                <span class="page1-jp">${word.jp}</span>
            </div>
        `;
        questionListDiv.appendChild(card);
    });
}

function goToPage2() {
    switchPage('page-1', 'page-2');
    renderPage2();
}

// 2ページ目（答え合わせ）の生成
function renderPage2() {
    const answerListDiv = document.getElementById('answer-list');
    answerListDiv.innerHTML = '';

    currentTestWords.forEach((word, index) => {
        const card = document.createElement('div');
        card.className = 'word-card';
        
        card.innerHTML = `
            <div class="word-info">
                <span class="question-num">Q${index + 1}</span>
                <div class="word-text-block">
                    <span class="en-text">${word.en}</span>
                    <span class="jp-sub-text">${word.jp}</span>
                </div>
            </div>
            <div class="btn-group">
                <button id="btn-ok-${word.id}" class="btn-check" onclick="selectResult(${word.id}, true)">〇 正解</button>
                <button id="btn-ng-${word.id}" class="btn-check" onclick="selectResult(${word.id}, false)">× 不正解</button>
            </div>
        `;
        answerListDiv.appendChild(card);
    });
    
    updateSubmitButtonStatus();
}

function selectResult(wordId, isCorrect) {
    tempSelections[wordId] = isCorrect;

    const okBtn = document.getElementById(`btn-ok-${wordId}`);
    const ngBtn = document.getElementById(`btn-ng-${wordId}`);

    if (isCorrect) {
        okBtn.className = "btn-check correct-active";
        ngBtn.className = "btn-check";
    } else {
        okBtn.className = "btn-check";
        ngBtn.className = "btn-check incorrect-active";
    }

    updateSubmitButtonStatus();
}

function updateSubmitButtonStatus() {
    const submitBtn = document.getElementById('btn-submit-record');
    const allChecked = currentTestWords.every(word => tempSelections[word.id] !== undefined);
    submitBtn.disabled = !allChecked;
}

// 3ページ目へ移動（間隔反復ロジックに従ってDBのインターバルと次回予定日を更新）
function submitRecords() {
    for (const wordId in tempSelections) {
        const word = wordDatabase.find(w => w.id == wordId);
        if (word) {
            if (tempSelections[wordId] === true) {
                // 正解の場合：間隔を倍にする (1日 → 2日 → 4日 → 8日 → 16日...)
                word.interval = word.interval * 2;
            } else {
                // 不正解の場合：間隔を1日にリセット
                word.interval = 1;
            }
            // 次回の復習予定日を「今日 + 新しい間隔（日）」に再設定
            word.nextDate = getFutureDate(word.interval);
        }
    }
    
    // ローカルストレージに状態を即時保存
    saveToLocalStorage();

    switchPage('page-2', 'page-3');
}

function restartTest() {
    switchPage('page-3', 'page-1');
    startTest();
}

function goToMenu() {
    const pages = ['page-1', 'page-2', 'page-3', 'page-add'];
    pages.forEach(p => document.getElementById(p).classList.add('hidden'));
    document.getElementById('page-0').classList.remove('hidden');
    updateMenuStatus();
}

function goToAddPage() {
    switchPage('page-0', 'page-add');
    const container = document.getElementById('input-fields-container');
    container.innerHTML = '';
    
    for (let i = 1; i <= 10; i++) {
        const row = document.createElement('div');
        row.className = 'input-row';
        row.innerHTML = `
            <span>#${i}</span>
            <input type="text" class="input-en" placeholder="英語 (Q)">
            <input type="text" class="input-jp" placeholder="日本語 (A)">
        `;
        container.appendChild(row);
    }
}

// 【変更】問題追加時にLocalStorageへ保存
function saveNewWords() {
    const enInputs = document.getElementsByClassName('input-en');
    const jpInputs = document.getElementsByClassName('input-jp');
    
    let newWordsTemp = [];
    let hasValidationError = false;

    for (let i = 0; i < enInputs.length; i++) {
        const enVal = enInputs[i].value.trim();
        const jpVal = jpInputs[i].value.trim();

        if (enVal !== "" && jpVal !== "") {
            newWordsTemp.push({ en: enVal, jp: jpVal });
        } else if ((enVal !== "" && jpVal === "") || (enVal === "" && jpVal !== "")) {
            hasValidationError = true;
            break;
        }
    }

    if (hasValidationError) {
        alert("英語と日本語の両方が入力されていない行があります。正しく揃えるか、追加しない行は両方とも空欄にしてください。");
        return;
    }

    if (newWordsTemp.length === 0) {
        alert("最低1組以上の単語を入力してください。");
        return;
    }

    let maxId = wordDatabase.reduce((max, word) => word.id > max ? word.id : max, 0);

    newWordsTemp.forEach(item => {
        maxId++;
        wordDatabase.push({
            id: maxId,
            en: item.en,
            jp: item.jp,
            interval: 1,
            nextDate: getFutureDate(1) 
        });
    });

    // ローカルストレージに新規データを保存
    saveToLocalStorage();

    alert(`${newWordsTemp.length}個の単語を追加しました。`);
    goToMenu();
}

// JSONファイルにデータを書き出して保存（ファイル名を AnkiAppData_YYYYMMDD_HHMMSS.json に変更）
function exportToJSON() {
    if (wordDatabase.length === 0) {
        alert("保存する単語データがありません。");
        return;
    }
    const jsonString = JSON.stringify(wordDatabase, null, 2);
    const blob = new Blob([jsonString], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    
    // 現在の日時を取得してフォーマット (例: 20260524_234912)
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const date = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const timestamp = `${year}${month}${date}_${hours}${minutes}${seconds}`;

    const a = document.createElement("a");
    a.href = url;
    // ファイル名を指定の形式に設定
    a.download = `AnkiAppData_${timestamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

// 【変更】JSON読み込み成功時にLocalStorageにも上書き保存
function importFromJSON(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data)) {
                wordDatabase = data;
                
                // ローカルストレージに反映
                saveToLocalStorage();
                
                alert(`JSONから ${wordDatabase.length}語 のデータを読み込み、ローカルに保存しました！`);
                updateMenuStatus();
            } else {
                alert("不正なJSON形式です。");
            }
        } catch (err) {
            alert("ファイルの読み込み中にエラーが発生しました。");
        }
        input.value = "";
    };
    reader.readAsText(file);
}

function switchPage(hideId, showId) {
    document.getElementById(hideId).classList.add('hidden');
    document.getElementById(showId).classList.remove('hidden');
}

// 【変更】起動時にLocalStorageから前回のデータを自動ロード
window.onload = function() {
    loadFromLocalStorage();
    updateMenuStatus();
};
</script>

</body>
</html>
