<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語暗記アプリ - 間隔反復(SRS)版</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .info-text {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }
        .word-card {
            background: #fafafa;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .word-info {
            display: flex;
            align-items: flex-start;
        }
        .question-num {
            font-weight: bold;
            color: #3498db;
            margin-right: 15px;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .word-text-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .jp-text {
            font-size: 1.2rem;
            font-weight: 600;
            flex-grow: 1;
        }
        /* 1ページ目の出題用（単語ブロック内でも単体で見やすく） */
        .page1-jp {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.5;
        }
        /* 2ページ目の答え合わせ用（赤文字に差し戻し） */
        .en-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e74c3c; 
        }
        .jp-sub-text {
            font-size: 1.05rem;
            color: #555;
            font-weight: normal;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            align-self: center; /* カードの右側中央に配置 */
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        /* 共通の大ボタン */
        .btn-action {
            background-color: #3498db;
            color: white;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            padding: 12px;
        }
        .btn-action:hover { background-color: #2980b9; }
        
        /* 初期状態のグレーボタン */
        .btn-check {
            background-color: #e2e8f0;
            color: #7f8c8d;
            font-weight: bold;
        }
        .btn-check:hover { background-color: #cbd5e1; }

        /* 選択された時の色 */
        .btn-check.correct-active {
            background-color: #2ecc71;
            color: white;
        }
        .btn-check.incorrect-active {
            background-color: #e74c3c;
            color: white;
        }

        /* 無効化状態のボタン */
        button:disabled {
            background-color: #cbd5e1 !important;
            color: #94a3b8 !important;
            cursor: not-allowed;
        }

        .hidden { display: none; }
        
        .result-message {
            text-align: center;
            font-size: 1.2rem;
            margin: 40px 0;
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="page-1">
        <h1>英単語テスト (10問)</h1>
        <p id="candidate-count" class="info-text">復習予定の単語を読み込み中...</p>
        
        <div id="question-list"></div>

        <button id="btn-to-page2" class="btn-action" onclick="goToPage2()">すべての回答を終了して答え合わせへ</button>
    </div>

    <div id="page-2" class="hidden">
        <h1>答え合わせ</h1>
        <p class="info-text">紙の回答と見比べて、全問の結果をチェックしてください。</p>
        
        <div id="answer-list"></div>

        <button id="btn-submit-record" class="btn-action" onclick="submitRecords()" disabled>結果を記録</button>
    </div>

    <div id="page-3" class="hidden">
        <h1>記録完了</h1>
        <div class="result-message">🎉 今回のテスト結果をDBに記録しました！</div>
        <p class="info-text">正解した単語の間隔が引き延ばされ、次回出題が先になります。</p>
        
        <button class="btn-action" onclick="restartTest()">次の10問を実施する</button>
    </div>
</div>

<script>
// ヘルパー関数: 指定日後の日付オブジェクト（時刻なし）を返す
function getFutureDate(days) {
    let d = new Date();
    d.setHours(0, 0, 0, 0); // 時刻をゼロクリアして日付のみで比較できるようにする
    d.setDate(d.getDate() + days);
    return d;
}

// 仕様(1) + 間隔反復仕様のダミーDB
// テストのため、一部はすでに「復習予定日（過去日）」を迎えている設定にしています
let wordDatabase = [
    { id: 1, en: "apple", jp: "りんご", interval: 1, nextDate: getFutureDate(-2) }, // 2日前に予定日超過
    { id: 2, en: "environment", jp: "環境", interval: 1, nextDate: getFutureDate(-1) },
    { id: 3, en: "consequence", jp: "結果、結論", interval: 2, nextDate: getFutureDate(-3) },
    { id: 4, en: "improve", jp: "改善する、向上させる", interval: 4, nextDate: getFutureDate(-5) },
    { id: 5, en: "simultaneously", jp: "同時に", interval: 1, nextDate: getFutureDate(0) },  // 今日が予定日
    { id: 6, en: "negotiate", jp: "交渉する", interval: 1, nextDate: getFutureDate(-1) },
    { id: 7, en: "vulnerable", jp: "脆弱な、傷つきやすい", interval: 1, nextDate: getFutureDate(-2) },
    { id: 8, en: "foster", jp: "育成する、促進する", interval: 2, nextDate: getFutureDate(-1) },
    { id: 9, en: "loyal", jp: "忠実な、誠実な", interval: 1, nextDate: getFutureDate(-4) },
    { id: 10, en: "significant", jp: "重要な、かなりの", interval: 1, nextDate: getFutureDate(-1) },
    { id: 11, en: "artificial", jp: "人工的な", interval: 8, nextDate: getFutureDate(5) },  // 5日後まで出ない
    { id: 12, en: "perspective", jp: "視点、見方", interval: 16, nextDate: getFutureDate(12) } // 12日後まで出ない
];

let currentTestWords = [];
let tempSelections = {};

// アプリ初期化：間隔反復ロジックに基づくテスト生成
function startTest() {
    tempSelections = {}; 
    
    // 今日の日付（時刻ゼロクリア）
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // 1. 日付が予定日を超えている（今日を含む過去）の単語をフィルタリング
    let candidates = wordDatabase.filter(word => {
        const nextDateObj = new Date(word.nextDate);
        return nextDateObj <= today;
    });

    // 画面に対象単語数を表示
    const countText = document.getElementById('candidate-count');
    countText.innerText = `手元の「紙」に英語で回答を記入してください。（現在出題可能な残り: ${candidates.length}語）`;

    // 2. 出題候補の中から「完全にランダム」に最大10問を抽出
    // 配列をフィッシャー–イェーツのシャッフル
    for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    // 先頭から10問を今回のテストに決定
    currentTestWords = candidates.slice(0, 10);

    // 出題表示の生成
    const questionListDiv = document.getElementById('question-list');
    questionListDiv.innerHTML = '';
    
    if (currentTestWords.length === 0) {
        questionListDiv.innerHTML = '<p style="text-align:center; color:#e74c3c; font-weight:bold;">現在、復習予定の単語はありません！</p>';
        document.getElementById('btn-to-page2').disabled = true;
        return;
    } else {
        document.getElementById('btn-to-page2').disabled = false;
    }

    currentTestWords.forEach((word, index) => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <div class="word-info">
                <span class="question-num">Q${index + 1}</span>
                <span class="page1-jp">${word.jp}</span>
            </div>
        `;
        questionListDiv.appendChild(card);
    });
}

function goToPage2() {
    switchPage('page-1', 'page-2');
    renderPage2();
}

// 2ページ目（答え合わせ）の生成
function renderPage2() {
    const answerListDiv = document.getElementById('answer-list');
    answerListDiv.innerHTML = '';

    currentTestWords.forEach((word, index) => {
        const card = document.createElement('div');
        card.className = 'word-card';
        
        card.innerHTML = `
            <div class="word-info">
                <span class="question-num">Q${index + 1}</span>
                <div class="word-text-block">
                    <span class="en-text">${word.en}</span>
                    <span class="jp-sub-text">${word.jp}</span>
                </div>
            </div>
            <div class="btn-group">
                <button id="btn-ok-${word.id}" class="btn-check" onclick="selectResult(${word.id}, true)">〇 正解</button>
                <button id="btn-ng-${word.id}" class="btn-check" onclick="selectResult(${word.id}, false)">× 不正解</button>
            </div>
        `;
        answerListDiv.appendChild(card);
    });
    
    updateSubmitButtonStatus();
}

function selectResult(wordId, isCorrect) {
    tempSelections[wordId] = isCorrect;

    const okBtn = document.getElementById(`btn-ok-${wordId}`);
    const ngBtn = document.getElementById(`btn-ng-${wordId}`);

    if (isCorrect) {
        okBtn.className = "btn-check correct-active";
        ngBtn.className = "btn-check";
    } else {
        okBtn.className = "btn-check";
        ngBtn.className = "btn-check incorrect-active";
    }

    updateSubmitButtonStatus();
}

function updateSubmitButtonStatus() {
    const submitBtn = document.getElementById('btn-submit-record');
    const allChecked = currentTestWords.every(word => tempSelections[word.id] !== undefined);
    submitBtn.disabled = !allChecked;
}

// 3ページ目へ移動（間隔反復ロジックに従ってDBのインターバルと次回予定日を更新）
function submitRecords() {
    for (const wordId in tempSelections) {
        const word = wordDatabase.find(w => w.id == wordId);
        if (word) {
            if (tempSelections[wordId] === true) {
                // 正解の場合：間隔を倍にする (1日 → 2日 → 4日 → 8日 → 16日...)
                word.interval = word.interval * 2;
            } else {
                // 不正解の場合：間隔を1日にリセット
                word.interval = 1;
            }
            // 次回の復習予定日を「今日 + 新しい間隔（日）」に再設定
            word.nextDate = getFutureDate(word.interval);
        }
    }

    // デベロッパーツールで次回予定日が未来に伸びたか確認用
    console.log("間隔反復更新後のDB:", wordDatabase);

    switchPage('page-2', 'page-3');
}

function restartTest() {
    switchPage('page-3', 'page-1');
    startTest();
}

function switchPage(hideId, showId) {
    document.getElementById(hideId).classList.add('hidden');
    document.getElementById(showId).classList.remove('hidden');
}

window.onload = startTest;
</script>

</body>
</html>
